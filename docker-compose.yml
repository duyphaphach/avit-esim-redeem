version: '3.8'

services:
  esim-web:
    build: .
    container_name: esim-web
    restart: always
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=${BACKEND_API_URL}
      - BACKEND_API_KEY=${BACKEND_API_KEY}
    ports:
      - "3000:3000"
    networks:
      - web-network

  nginx:
    image: nginx:alpine
    container_name: esim-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - esim-web
    networks:
      - web-network

networks:
  web-network:
    driver: bridge
